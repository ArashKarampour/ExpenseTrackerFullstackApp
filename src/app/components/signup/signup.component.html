<div id="form" class="d-flex justify-content-center align-items-center">
    <div class="card">
        <div class="card-header bg-secondary">
            <h3 class="card-title text-white">Sign Up</h3>
        </div>
        <div class="card-body">
            <form [formGroup]="signUpForm" (ngSubmit)="onSubmit()">
                <div class="mb-3">
                    <label for="email" class="form-label m-2">Email:</label>
                    <input type="email" id="email" formControlName="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label m-2">Password:</label>
                    <input type="password" id="password" formControlName="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password:</label>
                    <input type="password" id="confirmPassword" formControlName="confirmPassword" class="form-control" required>
                </div>
                <div class="d-grid p-2 m-2">
                    <button type="submit" class="btn btn-primary" [disabled]="!signUpForm.valid">Sign Up</button>
                </div>
                <div class="text-center">
                    <span>Already have an account? </span><a routerLink="/login">Login</a>
                </div>
            </form>
        </div>
    </div>
</div>
